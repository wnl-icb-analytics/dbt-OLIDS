version: 2
models:
- name: base_olids_allergy_intolerance
  description: 'Filtered Allergy Intolerance base view.


    Applied filters:

    - Patient filtering: Excludes sensitive patients (is_spine_sensitive=FALSE, is_confidential=FALSE, is_dummy_patient=FALSE)

    - Practice filtering: Restricts to NCL practices only (STPCode = ''QMJ'')

    - Data integrity: Inner joins ensure only records with valid patient and organisation references


    Filtering method: Inner join to base_olids_patient and int_ncl_practices'
  columns:
    - name: id
      tests:
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
    - name: patient_id
      tests:
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
        - referential_integrity:
            arguments:
              to: ref('base_olids_patient')
              field: id
              tolerance_percent: 1.0
    - name: person_id
      tests:
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
        - referential_integrity:
            arguments:
              to: ref('base_olids_person')
              field: id
              tolerance_percent: 1.0
    - name: practitioner_id
      tests:
        - referential_integrity:
            arguments:
              to: ref('base_olids_practitioner')
              field: id
              tolerance_percent: 1.0
    - name: encounter_id
      tests:
        - referential_integrity:
            arguments:
              to: ref('base_olids_encounter')
              field: id
              tolerance_percent: 1.0
    - name: lds_start_date_time
      tests:
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
    - name: clinical_effective_date
      tests:
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
    - name: allergy_intolerance_source_concept_id
      tests:
        - concept_mapping_integrity:
            arguments:
              tolerance_percent: 1.0
    - name: date_precision_concept_id
      tests:
        - concept_mapping_integrity:
            arguments:
              tolerance_percent: 1.0
        - column_completeness:
            arguments:
              tolerance_percent: 1.0
